version: "3.8"

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: simplingua-postgres
    environment:
      POSTGRES_DB: simplingua_dev
      POSTGRES_USER: simplingua
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "simplingua"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: simplingua-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://simplingua:dev_password@postgres:5432/simplingua_dev
      - JWT_SECRET=dev_secret_change_in_production
      - AI_DEFAULT_PROVIDER=deepseek
      - AI_DEEPSEEK_API_KEY=${AI_DEEPSEEK_API_KEY}
      - AI_OPENAI_API_KEY=${AI_OPENAI_API_KEY}
      - AI_ANTHROPIC_API_KEY=${AI_ANTHROPIC_API_KEY}
      - AI_LOCAL_BASE_URL=http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    volumes:
      - ./backend:/app

  # Next.js Frontend
  frontend:
    build: ./frontend
    container_name: simplingua-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    networks:
      - external

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
